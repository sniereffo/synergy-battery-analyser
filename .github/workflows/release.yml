name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: uv sync --group dev
      - run: uv run pytest -v

  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux
          - os: macos-latest
            suffix: macos
          - os: windows-latest
            suffix: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: uv sync --group dev
      - run: uv run pyinstaller synergy-battery-analyser.spec

      - name: Rename artifact (Linux/macOS)
        if: runner.os != 'Windows'
        run: mv dist/synergy-battery-analyser dist/synergy-battery-analyser-${{ matrix.suffix }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: mv dist/synergy-battery-analyser.exe dist/synergy-battery-analyser-${{ matrix.suffix }}.exe

      - uses: actions/upload-artifact@v4
        with:
          name: synergy-battery-analyser-${{ matrix.suffix }}
          path: dist/synergy-battery-analyser-${{ matrix.suffix }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            synergy-battery-analyser-linux
            synergy-battery-analyser-macos
            synergy-battery-analyser-windows.exe
